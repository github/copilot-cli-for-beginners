<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Copilot CLI for Beginners</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"
            integrity="sha384-JEyTNhjM6R1ElGoJns4U2Ln4ofPcqzSsynQkmEc/KGy6336qAZl70tDLufbkla+3"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"
            integrity="sha384-odPBjvtXVM/5hOYIr3A1dB+flh0c3wAT3bSesIOqEGmyUA4JoKf/YTWy0XKOYAY7"
            crossorigin="anonymous"></script>
    <style>
        :root {
            --bg: #0d1117;
            --bg-card: #161b22;
            --bg-code: #1c2128;
            --border: #30363d;
            --purple: #6e40c9;
            --purple-light: #a371f7;
            --blue: #58a6ff;
            --green: #3fb950;
            --orange: #e3b341;
            --gold: #f2cc60;
            --rose: #ff7aa2;
            --teal: #35c2a1;
            --text: #f0f6fc;
            --text-muted: #8b949e;
            --text-secondary: #c9d1d9;
            --gradient: linear-gradient(135deg, #6e40c9, #58a6ff);
            --header-height: 60px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .skip-link {
            position: absolute;
            top: -40px;
            left: 1rem;
            z-index: 200;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            background: var(--text);
            color: var(--bg);
            font-weight: 600;
            text-decoration: none;
        }

        .skip-link:focus {
            top: 1rem;
        }

        a:focus-visible,
        button:focus-visible,
        summary:focus-visible {
            outline: 3px solid var(--blue);
            outline-offset: 3px;
        }

        /* ── Header ── */
        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            height: var(--header-height);
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.25rem;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .header-brand:hover {
            color: var(--purple-light);
        }

        .header-brand svg {
            width: 22px;
            height: 22px;
            fill: var(--purple-light);
            flex-shrink: 0;
        }

        .header-title-text {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-nav {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.4rem 0.875rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8125rem;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
            font-family: inherit;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--purple-light);
            color: var(--purple-light);
            background: rgba(163,113,247,0.08);
        }

        .nav-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* ── Layout ── */
        .layout {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 268px;
            flex-shrink: 0;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            height: calc(100vh - var(--header-height));
            position: sticky;
            top: var(--header-height);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .sidebar-section {
            padding: 1.25rem 0.875rem;
        }

        .sidebar-label {
            font-size: 0.6875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            font-weight: 600;
            padding: 0 0.5rem;
            margin-bottom: 0.625rem;
        }

        .chapter-link {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            padding: 0.5rem 0.625rem;
            border-radius: 6px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.8125rem;
            transition: all 0.15s ease;
            margin-bottom: 0.125rem;
            cursor: pointer;
        }

        .chapter-link:hover {
            background: rgba(110,64,201,0.12);
            color: var(--text);
        }

        .chapter-link.active {
            background: linear-gradient(135deg, rgba(110,64,201,0.25), rgba(88,166,255,0.15));
            color: var(--text);
            border-left: 2px solid var(--purple-light);
            padding-left: calc(0.625rem - 2px);
        }

        .chapter-badge {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--border);
            border-radius: 5px;
            font-size: 0.6875rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            flex-shrink: 0;
            color: var(--text-secondary);
        }

        .chapter-link.active .chapter-badge {
            background: var(--gradient);
            color: #fff;
        }

        .chapter-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ── Main Content ── */
        .main {
            flex: 1;
            min-width: 0;
            padding: 2.5rem 3rem 4rem;
        }

        .content {
            max-width: 800px;
            margin: 0 auto;
        }

        /* ── Loading Spinner ── */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 260px;
            color: var(--text-muted);
            gap: 1rem;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--purple-light);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Error State ── */
        .error-state {
            background: rgba(248,81,73,0.1);
            border: 1px solid rgba(248,81,73,0.3);
            border-radius: 8px;
            padding: 1.5rem;
            color: #f85149;
            margin: 2rem 0;
        }

        /* ── Completion screen ── */
        .completion-shell {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(242,204,96,0.18);
            border-radius: 24px;
            background:
                radial-gradient(circle at top left, rgba(242,204,96,0.16), transparent 32%),
                radial-gradient(circle at top right, rgba(53,194,161,0.14), transparent 30%),
                linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)),
                var(--bg-card);
            padding: 2rem;
            box-shadow: 0 24px 80px rgba(0,0,0,0.28);
        }

        .completion-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.875rem;
            border-radius: 999px;
            border: 1px solid rgba(242,204,96,0.28);
            background: rgba(242,204,96,0.1);
            color: var(--gold);
            font-size: 0.8125rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .completion-title {
            margin: 1rem 0 0.75rem;
            font-size: clamp(2.25rem, 5vw, 3.5rem);
            line-height: 1.05;
            font-weight: 700;
            color: var(--text);
        }

        .completion-lead {
            max-width: 640px;
            font-size: 1.05rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .completion-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin: 1.75rem 0 2rem;
        }

        .completion-card {
            background: rgba(13,17,23,0.72);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1rem;
            backdrop-filter: blur(10px);
        }

        .completion-card strong {
            display: block;
            margin-bottom: 0.35rem;
            color: var(--text);
            font-size: 0.95rem;
        }

        .completion-card p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .resource-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 0.875rem;
            margin-top: 1.5rem;
        }

        .resource-link {
            display: block;
            text-decoration: none;
            color: inherit;
            padding: 1rem 1.125rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: rgba(13,17,23,0.78);
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .resource-link:hover {
            transform: translateY(-2px);
            border-color: rgba(53,194,161,0.55);
            background: rgba(53,194,161,0.08);
        }

        .resource-link strong {
            display: block;
            color: var(--text);
            margin-bottom: 0.25rem;
            font-size: 0.95rem;
        }

        .resource-link span {
            display: block;
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .completion-actions {
            display: flex;
            gap: 0.875rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .completion-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            border: 1px solid transparent;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .completion-btn:hover {
            transform: translateY(-1px);
        }

        .completion-btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--rose));
            color: #111;
            box-shadow: 0 12px 32px rgba(242,204,96,0.22);
        }

        .completion-btn-secondary {
            background: transparent;
            border-color: var(--border);
            color: var(--text);
        }

        .completion-btn-secondary:hover {
            border-color: var(--teal);
            color: var(--teal);
        }

        .confetti-layer {
            pointer-events: none;
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 150;
        }

        .confetti-piece {
            position: absolute;
            top: -10vh;
            width: 10px;
            height: 18px;
            border-radius: 2px;
            opacity: 0.9;
            animation: confetti-fall linear forwards;
            will-change: transform, opacity;
        }

        @keyframes confetti-fall {
            0% {
                transform: translate3d(0, 0, 0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translate3d(var(--confetti-drift), 115vh, 0) rotate(720deg);
                opacity: 0;
            }
        }

        /* ── Markdown Rendering ── */
        .markdown h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.3;
            padding-top: 0.5rem;
        }

        .markdown h2 {
            font-size: 1.375rem;
            font-weight: 600;
            margin: 2.5rem 0 1rem;
            color: var(--blue);
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .markdown h3 {
            font-size: 1.125rem;
            font-weight: 600;
            margin: 2rem 0 0.75rem;
            color: var(--purple-light);
        }

        .markdown h4 {
            font-size: 1rem;
            font-weight: 600;
            margin: 1.5rem 0 0.5rem;
            color: var(--text);
        }

        .markdown p {
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        .markdown a {
            color: var(--blue);
            text-decoration: none;
        }

        .markdown a:hover {
            text-decoration: underline;
        }

        .markdown strong {
            color: var(--text);
            font-weight: 600;
        }

        .markdown em {
            color: var(--text-secondary);
        }

        .markdown ul, .markdown ol {
            margin: 0.75rem 0 1.25rem 1.5rem;
            color: var(--text-secondary);
        }

        .markdown li {
            margin-bottom: 0.4rem;
        }

        .markdown li::marker {
            color: var(--purple-light);
        }

        .markdown ul li ul,
        .markdown ul li ol {
            margin-top: 0.25rem;
            margin-bottom: 0.25rem;
        }

        /* Blockquotes / tips */
        .markdown blockquote {
            background: rgba(88,166,255,0.07);
            border-left: 3px solid var(--blue);
            border-radius: 0 6px 6px 0;
            padding: 0.875rem 1.125rem;
            margin: 1.5rem 0;
        }

        .markdown blockquote p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.9375rem;
        }

        /* Code */
        .markdown code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
        }

        .markdown :not(pre) > code {
            background: var(--bg-code);
            padding: 0.15em 0.45em;
            border-radius: 4px;
            color: var(--orange);
            border: 1px solid var(--border);
        }

        .markdown pre {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem 1.25rem 1.25rem 1.5rem;
            overflow-x: auto;
            margin: 1.25rem 0;
            position: relative;
        }

        .markdown pre code {
            color: var(--text);
            background: none;
            padding: 0;
            border: none;
            font-size: 0.875em;
            line-height: 1.7;
        }

        /* Images */
        .markdown img {
            max-width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin: 1.25rem 0;
            display: block;
        }

        /* Tables */
        .markdown table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.9rem;
        }

        .markdown th, .markdown td {
            padding: 0.625rem 1rem;
            border: 1px solid var(--border);
            text-align: left;
        }

        .markdown th {
            background: var(--bg-card);
            color: var(--text);
            font-weight: 600;
            font-size: 0.8125rem;
        }

        .markdown td {
            color: var(--text-secondary);
        }

        .markdown tr:hover td {
            background: rgba(110,64,201,0.04);
        }

        /* HR */
        .markdown hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2rem 0;
        }

        /* Details/summary */
        .markdown details {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.875rem 1.125rem;
            margin: 1.25rem 0;
        }

        .markdown summary {
            cursor: pointer;
            font-weight: 600;
            color: var(--text);
            user-select: none;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .markdown summary::before {
            content: '▶';
            font-size: 0.75em;
            color: var(--purple-light);
            transition: transform 0.2s;
            display: inline-block;
        }

        .markdown details[open] summary::before {
            transform: rotate(90deg);
        }

        .markdown details > *:not(summary) {
            margin-top: 0.875rem;
        }

        /* Checkboxes (task lists) */
        .markdown input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-radius: 4px;
            margin-right: 0.5rem;
            vertical-align: middle;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
        }

        .markdown input[type="checkbox"]:checked {
            background: var(--green);
            border-color: var(--green);
        }

        .markdown input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: var(--bg);
            font-size: 11px;
            font-weight: 700;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Chapter header image hide (decorative banner) */
        .markdown img[alt*="Chapter"] {
            border: none;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        /* ── Footer navigation ── */
        .nav-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 3.5rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            gap: 1rem;
        }

        .nav-footer-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
            font-family: inherit;
        }

        .nav-footer-btn:hover:not(.disabled) {
            border-color: var(--purple-light);
            color: var(--purple-light);
            transform: translateY(-1px);
        }

        .nav-footer-btn.disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        .nav-footer-center {
            font-size: 0.8125rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .sidebar {
                display: none;
            }

            .main {
                padding: 1.75rem 1.25rem 3rem;
            }

            .header-title-text {
                display: none;
            }
        }

        @media (max-width: 600px) {
            .nav-footer {
                flex-direction: column;
            }

            .nav-footer-center {
                order: -1;
            }

            .completion-shell {
                padding: 1.25rem;
                border-radius: 18px;
            }
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="header-brand">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/></svg>
                <span class="header-title-text">GitHub Copilot CLI for Beginners</span>
            </a>
            <nav class="header-nav" aria-label="Chapter navigation">
                <button type="button" class="nav-btn" id="prevBtn" disabled>← Prev</button>
                <button type="button" class="nav-btn" id="nextBtn">Next →</button>
            </nav>
        </div>
    </header>

    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-label">Chapters</div>
                <nav id="chapterNav" aria-label="Course chapters"></nav>
            </div>
        </aside>

        <!-- Main -->
        <main class="main" id="main-content">
            <article class="content">
                <div id="content" class="markdown" tabindex="-1" aria-live="polite" aria-busy="true">
                    <div class="loading" role="status" aria-live="polite">
                        <div class="spinner"></div>
                        <span>Loading chapter…</span>
                    </div>
                </div>
                <nav class="nav-footer" aria-label="Chapter pagination">
                    <button type="button" class="nav-footer-btn disabled" id="prevFooter" disabled aria-disabled="true">← Previous</button>
                    <span class="nav-footer-center" id="chapterIndicator" aria-live="polite"></span>
                    <button type="button" class="nav-footer-btn" id="nextFooter">Next →</button>
                </nav>
            </article>
        </main>
    </div>

    <script>
        // ── Chapter manifest ──────────────────────────────────────────────
        const REPO = 'github/copilot-cli-for-beginners';
        const BRANCH = 'main';

        const chapters = [
            { id: '00-quick-start',              num: '00', title: 'Quick Start',                            emoji: '🚀' },
            { id: '01-setup-and-first-steps',    num: '01', title: 'First Steps',                            emoji: '👋' },
            { id: '02-context-conversations',    num: '02', title: 'Context and Conversations',              emoji: '🔍' },
            { id: '03-development-workflows',    num: '03', title: 'Development Workflows',                  emoji: '⚡' },
            { id: '04-agents-custom-instructions', num: '04', title: 'Specialized AI Assistants',           emoji: '🤖' },
            { id: '05-skills',                   num: '05', title: 'Automate Repetitive Tasks',              emoji: '🛠️' },
            { id: '06-mcp-servers',              num: '06', title: 'Connect to GitHub, Databases & APIs',   emoji: '🔌' },
            { id: '07-putting-it-together',      num: '07', title: 'Putting It All Together',               emoji: '🎯' },
            { id: 'complete',                    num: '✓',  title: 'Complete',                               emoji: '🎉', isComplete: true },
        ];

        // ── State ─────────────────────────────────────────────────────────
        let currentIndex = 0;

        function getChapterParam() {
            const params = new URLSearchParams(window.location.search);
            return params.get('chapter') || chapters[0].id;
        }

        function setChapterParam(id) {
            const url = new URL(window.location);
            url.searchParams.set('chapter', id);
            window.history.pushState({}, '', url);
        }

        function getChapterIndex(id) {
            const idx = chapters.findIndex(c => c.id === id);
            return idx >= 0 ? idx : 0;
        }

        function resolveRelativePath(baseDir, relativePath) {
            const stack = baseDir.split('/').filter(Boolean);
            const parts = relativePath.split('/');

            parts.forEach(part => {
                if (!part || part === '.') {
                    return;
                }

                if (part === '..') {
                    stack.pop();
                    return;
                }

                stack.push(part);
            });

            return stack.join('/');
        }

        function toRawGitHubUrl(path) {
            return `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${path}`;
        }

        function toBlobGitHubUrl(path) {
            return `https://github.com/${REPO}/blob/${BRANCH}/${path}`;
        }

        function getCompletionMarkup() {
            return `
                <section class="completion-shell">
                    <div class="completion-badge">Course Complete</div>
                    <h1 class="completion-title">You finished GitHub Copilot CLI for Beginners.</h1>
                    <p class="completion-lead">
                        You worked through the full path from setup to real workflows, custom agents, skills, MCP servers,
                        and an end-to-end feature flow. This screen is the finish line and the launch point.
                    </p>

                    <div class="completion-grid">
                        <div class="completion-card">
                            <strong>Built a working mental model</strong>
                            <p>You covered interactive prompts, planning, automation, and when each mode fits best.</p>
                        </div>
                        <div class="completion-card">
                            <strong>Used practical workflows</strong>
                            <p>You saw code review, debugging, test generation, and repo-aware prompting in context.</p>
                        </div>
                        <div class="completion-card">
                            <strong>Extended the system</strong>
                            <p>You explored custom agents, reusable skills, and MCP integrations for real data.</p>
                        </div>
                    </div>

                    <h2>Resources to keep going</h2>
                    <div class="resource-list">
                        <a class="resource-link" href="index.html">
                            <strong>Course Home</strong>
                            <span>Jump back to the overview, prerequisites, and chapter list.</span>
                        </a>
                        <a class="resource-link" href="https://github.com/github/copilot-cli-for-beginners" target="_blank" rel="noopener">
                            <strong>Repository</strong>
                            <span>Browse the source, sample apps, exercises, and open issues.</span>
                        </a>
                        <a class="resource-link" href="https://docs.github.com/en/copilot/how-tos/copilot-cli" target="_blank" rel="noopener">
                            <strong>Official CLI Docs</strong>
                            <span>Use the product docs for setup, concepts, and supported workflows.</span>
                        </a>
                        <a class="resource-link" href="https://docs.github.com/en/copilot/reference/cli-command-reference" target="_blank" rel="noopener">
                            <strong>Command Reference</strong>
                            <span>Keep the full command and shortcut list close while you practice.</span>
                        </a>
                        <a class="resource-link" href="https://github.com/github/copilot-cli-for-beginners/blob/main/GLOSSARY.md" target="_blank" rel="noopener">
                            <strong>Glossary</strong>
                            <span>Review terms like context window, tokens, MCP, and agentic workflows.</span>
                        </a>
                        <a class="resource-link" href="https://github.com/github/copilot-cli-for-beginners/tree/main/appendices" target="_blank" rel="noopener">
                            <strong>Appendices</strong>
                            <span>Go deeper on additional context features and CI/CD integration.</span>
                        </a>
                        <a class="resource-link" href="https://aka.ms/foundry/discord" target="_blank" rel="noopener">
                            <strong>Community Discord</strong>
                            <span>Join the broader AI community and keep experimenting with others.</span>
                        </a>
                    </div>

                    <div class="completion-actions">
                        <a class="completion-btn completion-btn-primary" href="https://github.com/github/copilot-cli-for-beginners" target="_blank" rel="noopener">Explore the Repo</a>
                        <a class="completion-btn completion-btn-secondary" href="step.html?chapter=00-quick-start">Restart the Course</a>
                    </div>
                </section>
            `;
        }

        function clearConfetti() {
            const layer = document.getElementById('confettiLayer');
            if (layer) {
                layer.remove();
            }
        }

        function launchConfetti() {
            clearConfetti();

            const layer = document.createElement('div');
            layer.id = 'confettiLayer';
            layer.className = 'confetti-layer';

            const colors = ['#f2cc60', '#ff7aa2', '#35c2a1', '#58a6ff', '#a371f7'];
            const pieceCount = 120;

            for (let i = 0; i < pieceCount; i += 1) {
                const piece = document.createElement('span');
                piece.className = 'confetti-piece';
                piece.style.left = `${Math.random() * 100}%`;
                piece.style.background = colors[i % colors.length];
                piece.style.animationDuration = `${4 + Math.random() * 2.5}s`;
                piece.style.animationDelay = `${Math.random() * 0.8}s`;
                piece.style.setProperty('--confetti-drift', `${(Math.random() - 0.5) * 240}px`);

                if (Math.random() > 0.5) {
                    piece.style.width = '8px';
                    piece.style.height = '8px';
                    piece.style.borderRadius = '50%';
                }

                layer.appendChild(piece);
            }

            document.body.appendChild(layer);

            window.setTimeout(() => {
                clearConfetti();
            }, 7000);
        }

        // ── Build sidebar nav ─────────────────────────────────────────────
        function buildNav() {
            const nav = document.getElementById('chapterNav');
            nav.innerHTML = chapters.map((ch, i) => `
                <a class="chapter-link" data-index="${i}" href="?chapter=${ch.id}">
                    <span class="chapter-badge">${ch.num}</span>
                    <span class="chapter-name">${ch.emoji} ${ch.title}</span>
                </a>
            `).join('');

            nav.addEventListener('click', e => {
                const link = e.target.closest('[data-index]');
                if (!link) return;
                e.preventDefault();
                loadChapter(parseInt(link.dataset.index, 10));
            });
        }

        function updateNav(index) {
            document.querySelectorAll('.chapter-link').forEach((el, i) => {
                el.classList.toggle('active', i === index);
                if (i === index) {
                    el.setAttribute('aria-current', 'page');
                } else {
                    el.removeAttribute('aria-current');
                }
            });
            // Scroll active item into view in sidebar
            const active = document.querySelector('.chapter-link.active');
            if (active) active.scrollIntoView({ block: 'nearest' });
        }

        // ── Navigation buttons ────────────────────────────────────────────
        function updateButtons(index) {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const prevFooter = document.getElementById('prevFooter');
            const nextFooter = document.getElementById('nextFooter');
            const indicator = document.getElementById('chapterIndicator');
            const chapter = chapters[index];

            const hasPrev = index > 0;
            const hasNext = index < chapters.length - 1;

            prevBtn.disabled = !hasPrev;
            nextBtn.disabled = !hasNext;
            prevBtn.setAttribute('aria-disabled', String(!hasPrev));
            nextBtn.setAttribute('aria-disabled', String(!hasNext));

            prevBtn.textContent = chapter.isComplete ? '← Chapter 07' : '← Prev';
            nextBtn.textContent = hasNext && chapters[index + 1].isComplete ? 'Complete →' : 'Next →';

            prevFooter.classList.toggle('disabled', !hasPrev);
            nextFooter.classList.toggle('disabled', !hasNext);
            prevFooter.disabled = !hasPrev;
            nextFooter.disabled = !hasNext;
            prevFooter.setAttribute('aria-disabled', String(!hasPrev));
            nextFooter.setAttribute('aria-disabled', String(!hasNext));

            prevFooter.textContent = chapter.isComplete ? '← Chapter 07' : '← Previous';
            nextFooter.textContent = hasNext && chapters[index + 1].isComplete ? 'Complete →' : 'Next →';

            indicator.textContent = `${index + 1} / ${chapters.length}`;
        }

        function wireButtons(index) {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const prevFooter = document.getElementById('prevFooter');
            const nextFooter = document.getElementById('nextFooter');

            // Clone to remove old listeners
            [prevBtn, nextBtn, prevFooter, nextFooter].forEach(btn => {
                const clone = btn.cloneNode(true);
                btn.parentNode.replaceChild(clone, btn);
            });

            const newPrevBtn = document.getElementById('prevBtn');
            const newNextBtn = document.getElementById('nextBtn');
            const newPrevFooter = document.getElementById('prevFooter');
            const newNextFooter = document.getElementById('nextFooter');

            if (index > 0) {
                newPrevBtn.addEventListener('click', () => loadChapter(index - 1));
                newPrevFooter.addEventListener('click', () => loadChapter(index - 1));
            }
            if (index < chapters.length - 1) {
                newNextBtn.addEventListener('click', () => loadChapter(index + 1));
                newNextFooter.addEventListener('click', () => loadChapter(index + 1));
            }
        }

        // ── Markdown image path fixer ─────────────────────────────────────
        function fixImagePaths(markdown, chapterId) {
            // Replace relative image paths with raw GitHub URLs
            const rawBase = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${chapterId}`;
            return markdown.replace(
                /!\[([^\]]*)\]\((?!https?:\/\/)([^)]+)\)/g,
                (match, alt, src) => {
                    const cleanSrc = src.startsWith('./') ? src.slice(2) : src;
                    return `![${alt}](${rawBase}/${cleanSrc})`;
                }
            );
        }

        // ── Render markdown ───────────────────────────────────────────────
        function renderMarkdown(raw, chapterId) {
            const processed = fixImagePaths(raw, chapterId);

            marked.setOptions({
                gfm: true,
                breaks: false,
            });

            return DOMPurify.sanitize(marked.parse(processed), {
                USE_PROFILES: { html: true },
            });
        }

        function normalizeRenderedContent(container, chapterId) {
            container.querySelectorAll('img[src]').forEach(img => {
                const src = img.getAttribute('src');
                if (!src || /^(https?:|data:)/i.test(src)) {
                    return;
                }

                img.src = toRawGitHubUrl(resolveRelativePath(chapterId, src));
            });

            container.querySelectorAll('a[href]').forEach(anchor => {
                const href = anchor.getAttribute('href');
                if (!href || /^(https?:|mailto:|#)/i.test(href)) {
                    return;
                }

                const [pathPart, hashPart] = href.split('#');
                const resolvedPath = resolveRelativePath(chapterId, pathPart);
                const hash = hashPart ? `#${hashPart}` : '';

                if (/\/README\.md$/i.test(resolvedPath)) {
                    const targetId = resolvedPath.replace(/\/README\.md$/i, '');
                    const targetIdx = chapters.findIndex(ch => ch.id === targetId);

                    if (targetIdx >= 0) {
                        anchor.href = `?chapter=${targetId}${hash}`;
                        anchor.addEventListener('click', event => {
                            event.preventDefault();
                            loadChapter(targetIdx);
                        });
                        return;
                    }
                }

                if (/\.md$/i.test(pathPart)) {
                    anchor.href = `${toBlobGitHubUrl(resolvedPath)}${hash}`;
                    anchor.target = '_blank';
                    anchor.rel = 'noopener';
                }
            });

            container.querySelectorAll('p').forEach(paragraph => {
                const linkTexts = Array.from(paragraph.querySelectorAll('a')).map(anchor => anchor.textContent.trim());
                const normalizedText = paragraph.textContent.replace(/\s+/g, ' ').trim();
                const isDuplicateChapterNav =
                    linkTexts.length > 0 &&
                    linkTexts.every(text => /^(←\s*)?Back to|^Continue to|^Return to/i.test(text)) &&
                    /^(←\s*)?Back to|^Continue to|^Return to/i.test(normalizedText);

                if (isDuplicateChapterNav) {
                    paragraph.remove();
                }
            });
        }

        // ── Load chapter content ──────────────────────────────────────────
        async function loadChapter(index) {
            currentIndex = index;
            const chapter = chapters[index];

            // Update URL
            setChapterParam(chapter.id);

            // Update UI state
            updateNav(index);
            updateButtons(index);
            wireButtons(index);

            // Update page title
            document.title = `${chapter.emoji} ${chapter.title} · GitHub Copilot CLI for Beginners`;

            // Show loading
            const contentEl = document.getElementById('content');
            contentEl.setAttribute('aria-busy', 'true');
            contentEl.innerHTML = `
                <div class="loading" role="status" aria-live="polite">
                    <div class="spinner"></div>
                    <span>Loading chapter…</span>
                </div>`;

            clearConfetti();

            // Scroll to top
            window.scrollTo({ top: 0 });

            if (chapter.isComplete) {
                contentEl.innerHTML = getCompletionMarkup();
                contentEl.setAttribute('aria-busy', 'false');
                contentEl.focus();
                launchConfetti();
                return;
            }

            try {
                const url = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${chapter.id}/README.md`;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const raw = await res.text();
                contentEl.innerHTML = renderMarkdown(raw, chapter.id);
                contentEl.querySelectorAll('input[type="checkbox"]').forEach(input => {
                    input.disabled = true;
                });
                normalizeRenderedContent(contentEl, chapter.id);
                contentEl.setAttribute('aria-busy', 'false');
                contentEl.focus();
            } catch (err) {
                const errDiv = document.createElement('div');
                errDiv.className = 'error-state';

                const strong = document.createElement('strong');
                strong.textContent = '⚠️ Could not load chapter content.';
                errDiv.appendChild(strong);

                const br = document.createElement('br');
                errDiv.appendChild(br);

                const small = document.createElement('small');
                small.style.marginTop = '0.5rem';
                small.style.display = 'block';
                small.textContent = err.message + ' ';

                const link = document.createElement('a');
                link.href = `https://github.com/${REPO}/tree/${BRANCH}/${chapter.id}`;
                link.style.color = '#f85149';
                link.target = '_blank';
                link.rel = 'noopener';
                link.textContent = 'View on GitHub →';
                small.appendChild(link);

                errDiv.appendChild(small);
                contentEl.innerHTML = '';
                contentEl.appendChild(errDiv);
                contentEl.setAttribute('aria-busy', 'false');
                contentEl.focus();
            }
        }

        // ── Browser back/forward support ──────────────────────────────────
        window.addEventListener('popstate', () => {
            const id = getChapterParam();
            const index = getChapterIndex(id);
            loadChapter(index);
        });

        // ── Init ──────────────────────────────────────────────────────────
        buildNav();
        const initialId = getChapterParam();
        const initialIndex = getChapterIndex(initialId);
        loadChapter(initialIndex);
    </script>
