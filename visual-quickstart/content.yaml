# yaml-language-server: $schema=content.schema.json
# Editable content for the Pip comic site.
# Edit the words here, then rebuild with build_site.py.
# The skill owns the rendering engine; this file owns the content.
# Per bubble: lines (the speech text), w (bubble width px),
# tx/ty (the speaker's head x/y - the tail points there).
# Course deep links: site.source_base_url + each chapter's `doc` give every frame
# a book icon linking to that chapter's README. Add a panel `link` (e.g. '#anchor')
# to deep-link a single frame to a specific section.

# Site-wide text and assets (everything not tied to a specific chapter/panel).
# All user-facing words live here; the engine (build_site.py) hard-codes none.
site:
  source_base_url: https://github.com/github/copilot-cli-for-beginners/blob/main  # base of the course repo for frame deep links
  lang: en
  title: GitHub Copilot - Visual Quickstart             # browser tab title (home page)
  chapter_title_suffix: ' - Pip''s Copilot CLI Comic'   # appended to each chapter's tab title
  favicon: assets/img/pip-hero.png
  avatar: assets/img/pip-avatar-hat.png
  avatar_alt: Pip the fox mascot waving
  select_label: Select a Chapter                        # home page chapter-picker button
  open_section_label: Read this section in the full course  # book-icon link (aria + tooltip)
  copy_command_label: Copy command                      # prefix for terminal copy-button aria-labels
  progress_label: 'Course progress: chapter {n} of {total}'  # banner progress bar (aria); {n}/{total} are filled in
  nav:
    home: Home
    prev: Previous Chapter
    prev_short: Prev
    next: Next Chapter
    next_short: Next

home:
  title_html: GitHub Copilot CLI<br>for Beginners
  subtitle: A visual quickstart reference for learning agentic coding.
  cta_text: Get Started!
  cta_href: chapter-00.html
  intro:
    img: ch00-welcome.png
    alt: Pip the fox waves hello beside Professor Quill the owl at a cozy desk with a laptop.
    caption: Meet Pip and Professor Quill - pick a chapter below to get started!
    bubbles:
    - lines:
      - Hi, I'm Pip! Ready to learn
      - about GitHub Copilot CLI?
      w: 624
      tx: 540
      ty: 250
    - lines:
      - Greetings! I'm Professor Quill. 
      - I explain the "why" behind each step.
      w: 690
      tx: 1140
      ty: 560
footer_html: <a href="https://github.com/github/copilot-cli-for-beginners">GitHub
  Copilot CLI for Beginners course</a>
chapters:
- badge: Chapter 00
